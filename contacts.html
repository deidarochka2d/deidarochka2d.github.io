<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    'roboto': ['"Roboto Slab"', 'serif'],
                    'heebo': ['"Heebo"', 'sans-serif'],
                }
            }
        }
        }
    </script>
</head>
<body class="bg-gray-100">
    <div class="max-w-[1920px] mx-auto bg-white shadow-2xl relative">
        <header class="bg-white py-6 px-4 shadow-lg relative z-20">
            
            <div class="flex flex-col md:flex-row justify-between items-center max-w-[1200px] mx-auto gap-6 md:gap-0">
                
                <div class="w-48">
                    <img src="./Images/logo.png" alt="Agridera" class="w-full h-auto">
                </div>

                <div class="flex flex-col items-center md:items-end space-y-6 w-full md:w-auto">
                    <div class="relative w-full max-w-80 border-b border-[#324950]/50 py-1">
                        <input type="text" placeholder="Search" class="bg-transparent w-full outline-none text-[16px] text-[#324950] placeholder-[#324950]/70 font-roboto">
                        <button class="absolute right-0 top-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#324950]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </button>
                    </div>

                    <nav class="flex flex-wrap justify-center gap-4 md:gap-8 font-heebo font-bold text-[16px] md:text-[18px] tracking-widest text-gray-700">
                        <a href="index.html" class="hover:text-green-600">Home</a>
                        <a href="#" class="hover:text-green-600">Company Profile</a>
                        <a href="tomato_all.html" class="hover:text-green-600">Products</a>
                        <a href="#" class="hover:text-green-600">Services</a>
                        <a href="#" class="hover:text-green-600">R & D</a>
                        <a href="contacts.html" class="hover:text-green-600">Contact</a>
                    </nav>
                </div>
            </div>
        </header>

        <section class="relative h-[250px] md:h-[480px] w-full overflow-hidden">
            <img src="./Images/bg_contacts.jpg" alt="Background" class="absolute inset-0 w-full h-full object-cover">
        </section>

        <section class="bg-[#F7F7F7] pb-2">
            <div class="max-w-[1100px] mx-auto px-4 py-12">
                
                <h1 class="font-roboto text-[48px] font-bold text-[#324950] mb-6">Contact us</h1>
                <div class="flex gap-0.5 mb-10">
                    <svg class="h-2 w-2 text-[#57984C] stroke-current" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                    <svg class="h-2 w-2 text-[#57984C] stroke-current" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                    <svg class="h-2 w-2 text-[#57984C] stroke-current" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                    <svg class="h-2 w-2 text-[#57984C] stroke-current" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                    <svg class="h-2 w-2 text-[#57984C] stroke-current" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                </div>

                <form class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-3">
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block font-heebo text-[17px] text-[#324950] mb-1">Name *</label>
                            <input type="text" required class="w-[350px] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                        <div>
                            <label class="block font-heebo text-[17px] text-[#324950] mb-1">Company Name</label>
                            <input type="text" class="w-[350px] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                        <div>
                            <label class="block font-heebo text-[17px] text-[#324950] mb-1">Position</label>
                            <input type="text" class="w-[350px] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                        <div>
                            <label class="block font-heebo text-[17px] text-[#324950] mb-1">City</label>
                            <input type="text" class="w-[350px] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                        <div>
                            <label class="block font-heebo text-[17px] text-[#324950] mb-1">Country</label>
                            <input type="text" class="w-[350px] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                        <div>
                            <label class="block font-heebo text-[17px] text-[#324950] mb-1">Telephone</label>
                            <input type="tel" class="w-[350px] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                        <div>
                            <label class="block font-heebo text-[17px] text-[#324950] mb-1">Email *</label>
                            <input type="email" required class="w-[350px] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                    </div>

                    <div class="space-y-6 flex flex-col">
                        <div>
                            <label class="block font-heebo text-[15px] text-[#324950] mb-1">You are a</label>
                            <select class="w-full border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C] bg-white">
                                <option>seed producer</option>
                                <option>distributor</option>
                                <option>grower</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-heebo text-[15px] text-[#324950] mb-1">If other, please specify</label>
                            <input type="text" class="w-full border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C]">
                        </div>
                        <div class="flex-grow">
                            <label class="block font-heebo text-[15px] text-[#324950] mb-1">You are interested in</label>
                            <textarea class="w-full h-[250px] md:h-[calc(100%-30px)] border border-gray-300 rounded-md p-2 outline-none focus:border-[#57984C] resize-none"></textarea>
                        </div>

                        <div class="flex flex-wrap items-end justify-between gap-4 mt-4">
                            <div class="flex items-center gap-4">
                                <div class="text-xl font-serif italic text-gray-500 tracking-widest select-none">7 c j 3</div>
                                <input type="text" placeholder="Please type this code" class="border border-gray-300 rounded-md p-2 w-48 outline-none focus:border-[#57984C]">
                            </div>
                            <button type="submit" class="bg-[#57984C] hover:bg-[#467a3d] text-white font-bold py-3 px-10 rounded-full transition-colors">
                                Send Message
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <section class="bg-[#FFFFFF] py-8">
            <div class="max-w-[1100px] mx-auto px-4 text-center">
                <div class="inline-block border-b-2 border-[#57984C] mb-6">
                    <h2 class="text-[#57984C] font-roboto text-[20px] font-bold pb-1 px-4">
                        Our Address
                    </h2>
                </div>
                
                <div class="text-[#324950] font-roboto text-[17px] leading-relaxed">
                    <p>AGRIDERA Seeds & Agriculture Ltd.</p>
                    <p>P.O Box 103,</p>
                    <p>Gedera 70750, Israel.</p>
                    <p class="mt-2">
                        Telephone: <span class="text-[#57984C] font-bold">+972 8 944 9222</span>
                    </p>
                </div>
            </div>
        </section>

        <footer class="bg-[#2D3F45] text-white">
            <div class="container mx-auto max-w-[1200px] px-4 py-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    
                    <nav class="flex flex-wrap justify-center gap-x-12 gap-y-2 text-[16px] uppercase">
                        <a href="#" class="hover:text-green-400 transition-colors">Profile</a>
                        <a href="#" class="hover:text-green-400 transition-colors">Management</a>
                        <a href="tomato_all.html" class="hover:text-green-400 transition-colors">Products</a>
                        <a href="#" class="hover:text-green-400 transition-colors">R&D</a>
                        <a href="#" class="hover:text-green-400 transition-colors">Links</a>
                        <a href="#" class="hover:text-green-400 transition-colors">Sitemap</a>
                        <a href="contacts.html" class="hover:text-green-400 transition-colors">Contact</a>
                    </nav>

                    <div class="flex gap-3 mt-6 md:mt-0">
                        <a href="#" class="hover:opacity-80 transition-opacity">
                            <img src="./Images/linkedin.png" alt="Linkedin" class="w-[31.2px] h-[31.2px] object-contain">
                        </a>
                        <a href="#" class="hover:opacity-80 transition-opacity">
                            <img src="./Images/inst.png" alt="Instagram" class="w-[31.2px] h-[31.2px] object-contain">
                        </a>
                        <a href="#" class="hover:opacity-80 transition-opacity">
                            <img src="./Images/youtube.png" alt="Youtube" class="w-[31.2px] h-[31.2px] object-contain">
                        </a>
                        <a href="#" class="hover:opacity-80 transition-opacity">
                            <img src="./Images/twitter.png" alt="Twitter" class="w-[31.2px] h-[31.2px] object-contain">
                        </a>
                        <a href="#" class="hover:opacity-80 transition-opacity">
                            <img src="./Images/facebook.png" alt="Facebook" class="w-[31.2px] h-[31.2px] object-contain">
                        </a>
                    </div>
                </div>
            </div>

            <div class="bg-[#324950] border-t border-gray-600/30 py-4">
                <div class="container mx-auto text-center">
                    <p class="text-[14px] text-[#B9B9B9] uppercase">
                        Agridera Seeds & Agriculture Ltd. © 2020
                    </p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
